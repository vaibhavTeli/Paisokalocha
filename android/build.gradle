buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    // This trick handles older libraries that still call jcenter()
    // It adds a 'jcenter' method to the repository handler that just points to mavenCentral
    repositories.all { repo ->
        if (repo instanceof org.gradle.api.artifacts.dsl.RepositoryHandler) {
            repo.metaClass.jcenter = { -> repo.mavenCentral() }
        }
    }
    
    repositories {
        google()
        mavenCentral()
    }
}
